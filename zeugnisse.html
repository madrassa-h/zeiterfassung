<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
  <title>Zeugnisse – Madrassa Hannover</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    :root{--blue:#2c5282;--blue-light:#4070b8;--blue-dark:#1d3a6e;--gold:#c4973a;--cream:#faf6ef;--sand:#f0e8d6;--text:#1a1a1a;--text-muted:#6b6355;--border:#d4c9b0;--accent:linear-gradient(135deg,#6c3483,#8e44ad);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:-webkit-fill-available}
    body{font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--text);min-height:100vh;min-height:100dvh;min-height:-webkit-fill-available;-webkit-text-size-adjust:100%;}
    /* HEADER */
    .app-header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
    .hdr-logo{width:38px;height:38px;object-fit:contain;border-radius:50%;background:#fff;padding:2px;flex-shrink:0;cursor:pointer;}
    .back-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);font-size:.68rem;font-weight:500;padding:4px 10px 4px 7px;border-radius:20px;text-decoration:none;transition:background .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;margin-bottom:4px;align-self:flex-start;}
    .back-chip:hover,.back-chip:active{background:rgba(255,255,255,.28);}
    .hdr-icon-btn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;flex-shrink:0;}
    .hdr-sub{color:rgba(255,255,255,.65);font-size:.7rem;}
    .hdr-icon-btn:hover,.hdr-icon-btn:active{background:rgba(255,255,255,.28);}
    .hdr-title{color:#fff;font-size:1rem;font-weight:600;line-height:1.2;}
    /* CONTENT */
    .page-content{padding:32px 20px;padding-bottom:calc(40px + env(safe-area-inset-bottom,0px));max-width:560px;margin:0 auto;}
    .coming-card{background:#fff;border-radius:20px;border:1px solid var(--border);padding:40px 28px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.06);}
    .coming-icon{font-size:3.5rem;margin-bottom:18px;display:block;}
    .coming-title{font-family:"Amiri",serif;font-size:1.8rem;color:var(--blue-dark);margin-bottom:10px;}
    .coming-desc{font-size:.88rem;color:var(--text-muted);line-height:1.7;max-width:300px;margin:0 auto 28px;}
    .coming-badge{display:inline-block;background:rgba(0,0,0,.05);border:1px solid var(--border);color:var(--text-muted);font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:6px 16px;border-radius:20px;}
    .accent-bar{height:4px;border-radius:0 0 20px 20px;background:var(--accent);margin:-1px -1px 0;border-radius:0 0 19px 19px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .coming-card{animation:fadeUp .35s ease both;}
    button,a{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
    input,select,textarea{font-size:max(16px,1em)!important;}
  </style>
</head>
<body>
    <header class="app-header">
    <img src="images/logo.PNG" onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=M&background=2c5282&color=fff&size=90&bold=true&rounded=true'" alt="Logo" class="hdr-logo"/>
    <div>
      <div class="hdr-title">Zeugnisse</div>
      <div class="hdr-sub">Madrassa Hannover e.V.</div>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0;">
      <a href="index.html" class="hdr-icon-btn" title="Portal" aria-label="Zurück zum Portal" style="text-decoration:none;opacity:.7;">⌂</a>
    </div>
  </header>
  <div class="page-content">
    <div class="coming-card">
      <div class="accent-bar" style="background:linear-gradient(135deg,#6c3483,#8e44ad);margin:-40px -28px 32px;border-radius:19px 19px 0 0;height:5px;"></div>
      <span class="coming-icon">🎓</span>
      <div class="coming-title">Zeugnisse</div>
      <div class="coming-desc">Noten, Berichte und Zertifikate für Schüler verwalten – kommt bald.</div>
      <span class="coming-badge">🚧 In Entwicklung</span>
    </div>
  </div>
</body>
</html>
